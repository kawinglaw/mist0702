<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>唯美迷雾空间 | Mist & Cockroach Prank</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0c10;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 全屏视频背景，照镜子式镜像 */
    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #video.active { opacity: 1; }

    /* 画布层级 */
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
    /* 层级：雾气(2) > 蟑螂(1) > 人脸视频(0)，手掌标记在雾气之上(3) */
    #floor-canvas { z-index: 0; opacity: 0; pointer-events: none; }
    #roach-canvas { z-index: 1; opacity: 0; transition: opacity 0.6s ease; }
    #mist-canvas  { z-index: 2; }
    #hand-canvas  { z-index: 3; }

    /* UI 层 */
    #ui-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #hint {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #2c2c2e;
      opacity: 0;
      transform: translateY(calc(-50% + 12px));
      transition: opacity 1s ease, transform 1s ease;
      text-align: center;
      pointer-events: none;
    }
    #hint .hint-main {
      font-size: clamp(15px, 2.2vw, 26px);
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 0 8px;
    }
    #hint.show { opacity: 1; transform: translateY(calc(-50% + 0px)); }
    #hint.fade { opacity: 0; transform: translateY(calc(-50% - 10px)); pointer-events: none; }

    #status {
      position: absolute;
      bottom: 8vh;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #status.show { opacity: 1; }

    #countdown {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      font-size: clamp(80px, 20vw, 220px);
      font-weight: 700;
      color: #ff1a3c;
      text-shadow:
        0 0 40px rgba(255,30,60,0.9),
        0 0 100px rgba(255,30,60,0.6),
        0 0 180px rgba(255,30,60,0.3);
      opacity: 0;
      transition: opacity 0.08s ease, transform 0.08s ease;
      pointer-events: none;
      z-index: 8;
    }
    #countdown.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* 封面 */
    #cover {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      background:
        radial-gradient(circle at 20% 30%, rgba(120, 255, 180, 0.18), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(80, 220, 160, 0.14), transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(60, 180, 130, 0.10), transparent 60%),
        linear-gradient(180deg, #0a1a12 0%, #0f2a1d 45%, #0a1a12 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: opacity 0.9s ease, visibility 0.9s;
    }
    #cover.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    #start-btn {
      font-family: inherit;
      padding: 22px 56px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      backdrop-filter: blur(20px) saturate(140%);
      cursor: pointer;
      transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 12px 40px rgba(0,0,0,0.25),
        0 0 80px rgba(120, 255, 180, 0.12);
    }
    #start-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.42);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1) inset,
        0 18px 50px rgba(0,0,0,0.3),
        0 0 100px rgba(120, 255, 180, 0.22);
      transform: translateY(-3px) scale(1.02);
    }

    /* 警报 */
    #alert {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s;
      background: rgba(0,0,0,0.35);
    }
    #alert.active { opacity: 1; visibility: visible; }
    #alert-box {
      max-width: 86vw;
      padding: 42px 48px;
      background: rgba(20, 0, 0, 0.78);
      border: 1px solid rgba(255, 40, 40, 0.65);
      border-radius: 8px;
      backdrop-filter: blur(22px) saturate(160%);
      box-shadow:
        0 0 80px rgba(255, 0, 0, 0.45),
        0 0 160px rgba(255, 0, 0, 0.25),
        inset 0 0 60px rgba(255, 40, 40, 0.18);
      text-align: center;
      color: #fff;
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #alert.active #alert-box {
      transform: scale(1);
      animation: alertShake 0.35s ease-in-out;
    }
    @keyframes alertShake {
      0%, 100% { transform: scale(1) translateX(0); }
      20% { transform: scale(1) translateX(-6px); }
      40% { transform: scale(1) translateX(6px); }
      60% { transform: scale(1) translateX(-3px); }
      80% { transform: scale(1) translateX(3px); }
    }
    #alert-box .icon {
      font-size: 52px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255,0,0,0.6));
    }
    #alert-box h2 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: 0.14em;
      margin-bottom: 10px;
      color: #ff3b3b;
      text-shadow:
        0 0 20px rgba(255,0,0,0.8),
        0 0 50px rgba(255,0,0,0.5);
    }
    #alert-box p {
      font-size: clamp(15px, 2.4vw, 22px);
      font-weight: 500;
      letter-spacing: 0.18em;
      color: rgba(255,220,220,0.95);
      line-height: 1.7;
    }

    /* 红光闪烁层 */
    #red-flash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.18), transparent 60%);
      opacity: 0;
      transition: opacity 0.08s ease;
      mix-blend-mode: overlay;
    }

    /* 扫描线 */
    #scanline {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 7;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 3px
      );
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #scanline.active { opacity: 1; }
  </style>
</head>
<body>

  <!-- 摄像头流 -->
  <video id="video" playsinline></video>

  <!-- 画布：地板、蟑螂、迷雾、手掌标记 -->
  <canvas id="floor-canvas"></canvas>
  <canvas id="roach-canvas"></canvas>
  <canvas id="mist-canvas"></canvas>
  <canvas id="hand-canvas"></canvas>

  <!-- 红光闪烁层 -->
  <div id="red-flash"></div>

  <!-- 扫描线遮罩 -->
  <div id="scanline"></div>

  <!-- UI 层 -->
  <div id="ui-layer">
    <div id="hint">
      <span class="hint-main">请朝屏幕哈气</span>
    </div>
    <div id="status">迷雾浓度探测中…</div>
  </div>

  <!-- 倒计时 -->
  <div id="countdown">3</div>

  <!-- 警报 -->
  <div id="alert">
    <div id="alert-box">
      <span class="icon">⚠️</span>
      <h2>WARNING</h2>
      <p>大蟑螂生态入侵<br>请举起双手投降</p>
    </div>
  </div>

  <!-- 封面 -->
  <div id="cover">
    <button id="start-btn">进入迷雾空间</button>
  </div>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    /* ==================== 配置常量 ==================== */
    const CONFIG = {
      particleCount: 3400,
      baseParticleRadius: 40,
      mistMaxAlpha: 0.88,
      mistBaseFill: 0.32,
      mouthOpenThreshold: 0.012,
      revealThreshold: 0.35,
      alertThreshold: 0.55,
      roachCount: 12,
      resetHoldFrames: 2
    };

    /* ==================== DOM 引用 ==================== */
    const videoEl = document.getElementById('video');
    const floorCanvas = document.getElementById('floor-canvas');
    const mistCanvas = document.getElementById('mist-canvas');
    const roachCanvas = document.getElementById('roach-canvas');
    const handCanvas = document.getElementById('hand-canvas');
    const cover = document.getElementById('cover');
    const startBtn = document.getElementById('start-btn');
    const hint = document.getElementById('hint');
    const statusEl = document.getElementById('status');
    const alertEl = document.getElementById('alert');
    const scanline = document.getElementById('scanline');
    const countdownEl = document.getElementById('countdown');
    const redFlash = document.getElementById('red-flash');

    const floorCtx = floorCanvas.getContext('2d');
    const mistCtx = mistCanvas.getContext('2d');
    const roachCtx = roachCanvas.getContext('2d');
    const handCtx = handCanvas.getContext('2d');

    // 预渲染迷雾粒子纹理，避免每帧创建径向渐变造成卡顿
    const mistTextureCanvas = document.createElement('canvas');
    const mistTextureCtx = mistTextureCanvas.getContext('2d');
    const MIST_TEX_SIZE = 128;
    mistTextureCanvas.width = MIST_TEX_SIZE;
    mistTextureCanvas.height = MIST_TEX_SIZE;
    const texGrad = mistTextureCtx.createRadialGradient(
      MIST_TEX_SIZE/2, MIST_TEX_SIZE/2, 0,
      MIST_TEX_SIZE/2, MIST_TEX_SIZE/2, MIST_TEX_SIZE/2
    );
    texGrad.addColorStop(0, 'rgba(255,255,255,0.98)');
    texGrad.addColorStop(0.42, 'rgba(245,245,245,0.42)');
    texGrad.addColorStop(1, 'rgba(255,255,255,0)');
    mistTextureCtx.fillStyle = texGrad;
    mistTextureCtx.fillRect(0, 0, MIST_TEX_SIZE, MIST_TEX_SIZE);

    let W = window.innerWidth;
    let H = window.innerHeight;

    function resizeAll() {
      W = window.innerWidth;
      H = window.innerHeight;
      [floorCanvas, mistCanvas, roachCanvas, handCanvas].forEach(c => {
        c.width = W;
        c.height = H;
      });
      drawFloor();
    }
    window.addEventListener('resize', resizeAll);
    resizeAll();

    /* ==================== 状态机 ==================== */
    const STATE = {
      started: false,
      mouthOpen: false,
      mouthDistance: 0,
      mouthX: 0.5,
      mouthY: 0.5,
      clearedRatio: 0,
      twoHandsUp: false,
      alertShown: false,
      handsEnabled: false,
      resetFrames: 0,
      time: 0,
      smoothBlow: 0,
      alertDelay: 0,
      hintDismissed: false,
      countdown: 0,
      countdownActive: false,
      countdownFrames: 0,
      alertFadeFrames: 0
    };

    let resultsHands = null;

    /* ==================== 水泥地板（纯 Canvas 绘制） ==================== */
    function drawFloor() {
      const ctx = floorCtx;
      ctx.clearRect(0, 0, W, H);

      // 底色
      const baseGrad = ctx.createLinearGradient(0, 0, 0, H);
      baseGrad.addColorStop(0, '#2a2d33');
      baseGrad.addColorStop(1, '#1a1c21');
      ctx.fillStyle = baseGrad;
      ctx.fillRect(0, 0, W, H);

      // 水泥噪点
      for (let i = 0; i < 9000; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        const r = Math.random() * 1.6;
        const g = 40 + Math.random() * 50;
        ctx.globalAlpha = 0.12 + Math.random() * 0.18;
        ctx.fillStyle = `rgb(${g},${g},${g+4})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // 划痕
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 40; i++) {
        ctx.beginPath();
        const x = Math.random() * W;
        const y = Math.random() * H;
        ctx.moveTo(x, y);
        ctx.lineTo(x + (Math.random() - 0.5) * 220, y + (Math.random() - 0.5) * 80);
        ctx.stroke();
      }

      // 暗角
      const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.9);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,0,0.55)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
    }

    /* ==================== 迷雾粒子系统 ==================== */
    class MistParticle {
      constructor() {
        this.reset(true);
      }
      reset(randomize = false) {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.baseX = this.x;
        this.baseY = this.y;
        this.radius = CONFIG.baseParticleRadius * (0.7 + Math.random() * 0.9);
        this.maxAlpha = CONFIG.mistMaxAlpha * (0.5 + Math.random() * 0.5);
        this.alpha = this.maxAlpha;
        this.heat = 0;
        this.vx = 0;
        this.vy = 0;
        this.phase = Math.random() * Math.PI * 2;
        this.freq = 0.0008 + Math.random() * 0.0015;
        this.amplitude = 8 + Math.random() * 18;
        this.cleared = false;
        if (!randomize) {
          this.x = Math.random() * W;
          this.y = Math.random() * H;
          this.baseX = this.x;
          this.baseY = this.y;
        }
      }

      update(t, blowX, blowY, blowRadius, blowPower) {
        // 正弦噪声漂移
        const nx = Math.sin(t * this.freq + this.phase) * this.amplitude;
        const ny = Math.cos(t * this.freq * 0.7 + this.phase * 1.3) * this.amplitude;

        this.baseX += Math.sin(t * 0.0003 + this.phase) * 0.18;
        this.baseY += Math.cos(t * 0.0004 + this.phase) * 0.12;

        // 边界环绕
        if (this.baseX < -80) this.baseX = W + 80;
        if (this.baseX > W + 80) this.baseX = -80;
        if (this.baseY < -80) this.baseY = H + 80;
        if (this.baseY > H + 80) this.baseY = -80;

        // 哈气推开逻辑：小口小半径、大口大半径；热量只增不减，确保状态不撤回
        if (blowPower > 0.05 && blowRadius > 0) {
          const dx = this.x - blowX;
          const dy = this.y - blowY;
          const d2 = dx*dx + dy*dy;
          const r2 = blowRadius * blowRadius;
          if (d2 < r2) {
            const d = Math.sqrt(d2) + 0.001;
            const td = d / blowRadius;
            const falloff = (1 - td);
            const force = (falloff * falloff * 5.5 + falloff * 1.2) * blowPower;
            const nx = dx / d;
            const ny = dy / d;
            this.vx += nx * force;
            this.vy += ny * force;
            // base 也被缓慢推开，产生持久消散感
            this.baseX += nx * force * 0.45;
            this.baseY += ny * force * 0.45;
            // 热量阶段式累积：同一区域需哈气多次才会完全消散
            this.heat += (falloff * 0.9 + 0.35) * blowPower;
          }
        }

        // 速度衰减
        this.vx *= 0.93;
        this.vy *= 0.93;

        // 位置更新
        this.x = this.baseX + nx + this.vx;
        this.y = this.baseY + ny + this.vy;

        // 透明度按热量阶段平滑过渡：1次约消失35%，2次约82%，3次完全消散
        let targetAlpha = this.maxAlpha;
        if (this.heat >= 3.0) {
          targetAlpha = 0;
          this.cleared = true;
        } else if (this.heat >= 2.0) {
          targetAlpha = this.maxAlpha * 0.18;
        } else if (this.heat >= 1.0) {
          targetAlpha = this.maxAlpha * 0.65;
        }
        this.alpha += (targetAlpha - this.alpha) * 0.08;
        if (this.alpha < 0.005) this.cleared = true;
      }

      draw(ctx) {
        if (this.alpha <= 0.01) return;
        ctx.globalAlpha = this.alpha;
        const s = this.radius * 2;
        ctx.drawImage(mistTextureCanvas, this.x - this.radius, this.y - this.radius, s, s);
      }
    }

    const particles = Array.from({ length: CONFIG.particleCount }, () => new MistParticle());

    /* ==================== 蟑螂类（参考 emoji 🪳，会动会爬） ==================== */
    class Roach {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.angle = Math.random() * Math.PI * 2;
        this.targetAngle = this.angle;
        this.baseSpeed = 1.4 + Math.random() * 2.0;
        this.speed = this.baseSpeed;
        this.size = 12 + Math.random() * 14;
        this.legPhase = Math.random() * 100;
        this.stopTimer = 0;
        this.dashTimer = 0;
        this.turnTimer = 0;
        this.scrambleTimer = 0;
      }

      update() {
        // 随机受惊乱窜
        if (this.scrambleTimer > 0) {
          this.scrambleTimer--;
          this.speed = this.baseSpeed * (4 + Math.random() * 3);
          this.targetAngle += (Math.random() - 0.5) * 1.2;
        } else if (this.dashTimer > 0) {
          this.speed = this.baseSpeed * (2.8 + Math.random() * 3);
          this.dashTimer--;
        } else if (this.stopTimer > 0) {
          this.speed *= 0.85;
          this.stopTimer--;
          if (Math.random() < 0.06) {
            this.dashTimer = 6 + Math.random() * 18;
            this.targetAngle += (Math.random() - 0.5) * 1.0;
          }
        } else {
          this.speed += (this.baseSpeed - this.speed) * 0.06;
          if (Math.random() < 0.02) this.dashTimer = 8 + Math.random() * 22;
          if (Math.random() < 0.025) this.stopTimer = 5 + Math.random() * 16;
          if (Math.random() < 0.008) this.scrambleTimer = 8 + Math.random() * 18;
        }

        // 平滑转向
        this.turnTimer--;
        if (this.turnTimer <= 0) {
          this.targetAngle += (Math.random() - 0.5) * 1.6;
          this.turnTimer = 18 + Math.random() * 55;
        }
        let diff = this.targetAngle - this.angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        this.angle += diff * 0.10;

        // 移动
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // 边界环绕：自由爬动，不受限制
        if (this.x < -this.size * 2) this.x = W + this.size * 2;
        if (this.x > W + this.size * 2) this.x = -this.size * 2;
        if (this.y < -this.size * 2) this.y = H + this.size * 2;
        if (this.y > H + this.size * 2) this.y = -this.size * 2;

        // 腿摆动速度随速度变化，停顿时腿会轻轻搓动
        const moving = this.speed > 0.3;
        this.legPhase += moving ? (0.38 + this.speed * 0.18) : 0.12;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        const s = this.size;
        const bodyLen = s * 2.4;
        const bodyHeight = s * 1.05;
        const speedRatio = Math.min(1, this.speed / (this.baseSpeed * 3));

        // 整体爬行姿态：轻微摇摆 + 身体上下起伏
        const wobble = Math.sin(this.legPhase * 0.55) * 0.06 * speedRatio;
        const bob = Math.abs(Math.sin(this.legPhase)) * s * 0.12 * speedRatio;
        ctx.rotate(this.angle + wobble);
        ctx.translate(0, -bob);

        // 投影（随身体起伏轻微缩放）
        ctx.fillStyle = 'rgba(0,0,0,0.42)';
        ctx.beginPath();
        ctx.ellipse(s*0.1, s*0.32 - bob*0.4, bodyLen*0.46, bodyHeight*0.32, 0, 0, Math.PI*2);
        ctx.fill();

        // 身体主体：更圆的扁椭圆侧面轮廓，像 🪳
        const bodyGrad = ctx.createLinearGradient(-bodyLen*0.5, -bodyHeight, bodyLen*0.5, bodyHeight);
        bodyGrad.addColorStop(0, '#a06f48');
        bodyGrad.addColorStop(0.25, '#7d5235');
        bodyGrad.addColorStop(0.55, '#5c3a26');
        bodyGrad.addColorStop(0.82, '#3f2719');
        bodyGrad.addColorStop(1, '#26150c');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.ellipse(0, 0, bodyLen*0.5, bodyHeight*0.5, 0, 0, Math.PI*2);
        ctx.fill();

        // 背脊光泽：从头部到尾部的高亮条
        const shine = ctx.createLinearGradient(-bodyLen*0.35, -bodyHeight*0.18, bodyLen*0.35, -bodyHeight*0.18);
        shine.addColorStop(0, 'rgba(255,235,200,0.28)');
        shine.addColorStop(0.5, 'rgba(255,235,200,0.12)');
        shine.addColorStop(1, 'rgba(255,235,200,0)');
        ctx.fillStyle = shine;
        ctx.beginPath();
        ctx.ellipse(0, -bodyHeight*0.08, bodyLen*0.40, bodyHeight*0.18, 0, 0, Math.PI*2);
        ctx.fill();

        // 侧腹反光
        const sideShine = ctx.createRadialGradient(bodyLen*0.12, bodyHeight*0.22, 0, bodyLen*0.12, bodyHeight*0.22, bodyHeight*0.55);
        sideShine.addColorStop(0, 'rgba(210,165,120,0.22)');
        sideShine.addColorStop(1, 'rgba(210,165,120,0)');
        ctx.fillStyle = sideShine;
        ctx.beginPath();
        ctx.ellipse(0, 0, bodyLen*0.44, bodyHeight*0.38, 0, 0, Math.PI*2);
        ctx.fill();

        // 甲壳分节线
        ctx.strokeStyle = 'rgba(25,14,8,0.45)';
        ctx.lineWidth = s * 0.035;
        for (let i = -1; i <= 1; i++) {
          const xOff = i * bodyLen * 0.14;
          ctx.beginPath();
          ctx.moveTo(xOff, -bodyHeight*0.42);
          ctx.lineTo(xOff, bodyHeight*0.42);
          ctx.stroke();
        }

        // 头部
        const headX = -bodyLen*0.52;
        const headGrad = ctx.createRadialGradient(headX - s*0.08, -s*0.06, 0, headX, 0, s*0.50);
        headGrad.addColorStop(0, '#9c6540');
        headGrad.addColorStop(0.5, '#6b432a');
        headGrad.addColorStop(1, '#2d1a10');
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.ellipse(headX, 0, s*0.42, s*0.45, 0, 0, Math.PI*2);
        ctx.fill();

        // 眼睛
        ctx.fillStyle = 'rgba(10,5,3,0.75)';
        ctx.beginPath();
        ctx.arc(headX - s*0.18, -s*0.18, s*0.07, 0, Math.PI*2);
        ctx.arc(headX - s*0.18, s*0.18, s*0.07, 0, Math.PI*2);
        ctx.fill();

        // 口器小突起
        ctx.fillStyle = '#3e2718';
        ctx.beginPath();
        ctx.ellipse(headX - s*0.38, 0, s*0.10, s*0.06, 0, 0, Math.PI*2);
        ctx.fill();

        // 触角根部
        ctx.fillStyle = '#5a3a25';
        ctx.beginPath();
        ctx.arc(headX - s*0.32, -s*0.16, s*0.07, 0, Math.PI*2);
        ctx.arc(headX - s*0.32, s*0.16, s*0.07, 0, Math.PI*2);
        ctx.fill();

        // 触角：长须，更细，从头部前端向前外侧张开成扇形
        ctx.strokeStyle = 'rgba(45,28,18,0.92)';
        ctx.lineWidth = s * 0.032;
        ctx.lineCap = 'round';
        const antPhase = this.legPhase * 0.55;
        const antSwing1 = Math.sin(antPhase) * s * 0.25;
        const antSwing2 = Math.cos(antPhase) * s * 0.25;

        // 上触角：持续向前外侧展开，不回勾
        ctx.beginPath();
        ctx.moveTo(headX - s*0.32, -s*0.16);
        ctx.quadraticCurveTo(
          headX - s*1.05,
          -s*1.25 + antSwing1,
          headX - s*2.1,
          -s*1.45 + antSwing1 * 1.1
        );
        ctx.stroke();

        // 下触角：持续向前外侧展开，不回勾
        ctx.beginPath();
        ctx.moveTo(headX - s*0.32, s*0.16);
        ctx.quadraticCurveTo(
          headX - s*1.05,
          s*1.25 + antSwing2,
          headX - s*2.1,
          s*1.45 + antSwing2 * 1.1
        );
        ctx.stroke();

        // 腿：6 条，分三对，交替摆动（爬行感）
        ctx.strokeStyle = 'rgba(38,24,15,0.92)';
        ctx.lineWidth = s * 0.075;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const legX = [-bodyLen*0.18, bodyLen*0.08, bodyLen*0.34];
        for (let i = 0; i < 3; i++) {
          const xOff = legX[i];
          // 相邻腿相位错开，形成交替爬行
          const legSwing = Math.sin(this.legPhase + i * 1.3) * s * (0.32 + speedRatio * 0.28);

          // 左侧腿（前进时向后蹬）
          ctx.beginPath();
          ctx.moveTo(xOff, -bodyHeight*0.30);
          ctx.lineTo(xOff - s*0.18, -bodyHeight*0.68 - legSwing * 0.6);
          ctx.lineTo(xOff - s*0.62, -bodyHeight*0.92 - legSwing);
          ctx.stroke();

          // 右侧腿
          ctx.beginPath();
          ctx.moveTo(xOff, bodyHeight*0.30);
          ctx.lineTo(xOff - s*0.18, bodyHeight*0.68 + legSwing * 0.6);
          ctx.lineTo(xOff - s*0.62, bodyHeight*0.92 + legSwing);
          ctx.stroke();
        }

        // 尾须（像 🪳 尾部的小须）
        ctx.strokeStyle = 'rgba(45,28,18,0.85)';
        ctx.lineWidth = s * 0.04;
        const tailPhase = this.legPhase * 0.65;
        ctx.beginPath();
        ctx.moveTo(bodyLen*0.48, -s*0.08);
        ctx.quadraticCurveTo(
          bodyLen*0.78,
          -s*0.32 + Math.sin(tailPhase) * s * 0.10,
          bodyLen*0.92,
          -s*0.18 + Math.sin(tailPhase) * s * 0.16
        );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bodyLen*0.48, s*0.08);
        ctx.quadraticCurveTo(
          bodyLen*0.78,
          s*0.32 - Math.cos(tailPhase) * s * 0.10,
          bodyLen*0.92,
          s*0.18 - Math.cos(tailPhase) * s * 0.16
        );
        ctx.stroke();

        ctx.restore();
      }
    }

    const roaches = Array.from({ length: CONFIG.roachCount }, () => new Roach());

    /* ==================== MediaPipe 初始化 ==================== */
    let faceMesh, hands, camera;

    function onFaceResults(results) {
      if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        STATE.mouthOpen = false;
        return;
      }
      const lm = results.multiFaceLandmarks[0];
      // 上唇 13，下唇 14
      const top = lm[13];
      const bottom = lm[14];
      const dx = top.x - bottom.x;
      const dy = top.y - bottom.y;
      const dz = top.z - bottom.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

      STATE.mouthDistance = dist;
      STATE.mouthOpen = dist > CONFIG.mouthOpenThreshold;

      // 坐标映射到屏幕（考虑 CSS 镜像）
      const rawX = (top.x + bottom.x) / 2;
      const rawY = (top.y + bottom.y) / 2;
      // 因为 CSS scaleX(-1)，视觉坐标需要镜像
      STATE.mouthX = (1 - rawX) * W;
      STATE.mouthY = rawY * H;
    }

    function onHandsResults(results) {
      resultsHands = results;
      if (!STATE.handsEnabled) {
        STATE.twoHandsUp = false;
        return;
      }
      if (!results.multiHandLandmarks || results.multiHandLandmarks.length < 2) {
        STATE.twoHandsUp = false;
        return;
      }
      // 检测两只手是否举起（手掌在画面偏上，且手指张开）
      const isPalmUp = (lm) => {
        const wrist = lm[0];
        const middleTip = lm[12];
        const indexTip = lm[8];
        const ringTip = lm[16];
        const pinkyTip = lm[20];
        // 手掌举起：手腕在指尖下方（y 更大）
        const raised = wrist.y > middleTip.y && wrist.y > indexTip.y;
        // 手指张开：指尖之间距离足够
        const tips = [indexTip, middleTip, ringTip, pinkyTip];
        let spread = 0;
        for (let i = 0; i < tips.length - 1; i++) {
          spread += Math.hypot(tips[i].x - tips[i+1].x, tips[i].y - tips[i+1].y);
        }
        return raised && spread > 0.12;
      };

      STATE.twoHandsUp = results.multiHandLandmarks.every(isPalmUp);
    }

    function initMediaPipe() {
      faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
      });
      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      faceMesh.onResults(onFaceResults);

      hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      hands.onResults(onHandsResults);

      camera = new Camera(videoEl, {
        onFrame: async () => {
          await faceMesh.send({ image: videoEl });
          if (STATE.handsEnabled) {
            await hands.send({ image: videoEl });
          }
        },
        width: 1280,
        height: 720
      });
    }

    /* ==================== 手掌红色圆点绘制 ==================== */
    function drawHandMarkers() {
      handCtx.clearRect(0, 0, W, H);
      if (!STATE.handsEnabled || !resultsHands || !resultsHands.multiHandLandmarks || resultsHands.multiHandLandmarks.length < 2) {
        return;
      }

      // 呼吸 + 闪烁组合
      const pulse = 1 + Math.sin(STATE.time * 0.12) * 0.18;
      const flicker = 0.85 + Math.sin(STATE.time * 0.35) * 0.15;

      for (const lm of resultsHands.multiHandLandmarks) {
        const palm = lm[9];
        const x = (1 - palm.x) * W;
        const y = palm.y * H;

        // 红色投影阴影（偏移）
        handCtx.fillStyle = 'rgba(120, 0, 20, 0.35)';
        handCtx.beginPath();
        handCtx.arc(x + 7 * pulse, y + 7 * pulse, 17 * pulse, 0, Math.PI * 2);
        handCtx.fill();

        // 外层羽化光晕
        const outer = handCtx.createRadialGradient(x, y, 0, x, y, 80 * pulse);
        outer.addColorStop(0, `rgba(255,30,60,${0.55 * flicker})`);
        outer.addColorStop(0.3, `rgba(255,30,60,${0.22 * flicker})`);
        outer.addColorStop(1, 'rgba(255,30,60,0)');
        handCtx.fillStyle = outer;
        handCtx.beginPath();
        handCtx.arc(x, y, 80 * pulse, 0, Math.PI * 2);
        handCtx.fill();

        // 中层羽化光晕
        const mid = handCtx.createRadialGradient(x, y, 0, x, y, 42 * pulse);
        mid.addColorStop(0, `rgba(255,45,75,${0.9 * flicker})`);
        mid.addColorStop(0.5, `rgba(255,45,75,${0.35 * flicker})`);
        mid.addColorStop(1, 'rgba(255,45,75,0)');
        handCtx.fillStyle = mid;
        handCtx.beginPath();
        handCtx.arc(x, y, 42 * pulse, 0, Math.PI * 2);
        handCtx.fill();

        // 内层羽化光晕（无实心边界、无亮核）
        const inner = handCtx.createRadialGradient(x, y, 0, x, y, 18 * pulse);
        inner.addColorStop(0, `rgba(255,65,90,${0.95 * flicker})`);
        inner.addColorStop(0.6, `rgba(255,40,65,${0.45 * flicker})`);
        inner.addColorStop(1, 'rgba(255,40,65,0)');
        handCtx.fillStyle = inner;
        handCtx.beginPath();
        handCtx.arc(x, y, 18 * pulse, 0, Math.PI * 2);
        handCtx.fill();
      }
    }

    /* ==================== 主循环 ==================== */
    function render() {
      STATE.time += 1;

      // 平滑哈气强度，避免 MediaPipe 检测抖动造成一卡一卡
      const targetBlow = (STATE.mouthOpen && STATE.started) ? Math.min(1, STATE.mouthDistance / 0.035) : 0;
      STATE.smoothBlow += (targetBlow - STATE.smoothBlow) * 0.12;
      const blowPower = STATE.smoothBlow;
      const isBlowing = blowPower > 0.05;
      const blowRadius = isBlowing ? 70 + blowPower * 160 : 0;

      // 迷雾更新
      let clearedCount = 0;
      mistCtx.clearRect(0, 0, W, H);

      // 底层均匀薄雾，确保初始状态完全遮住摄像头画面
      if (blowPower < 0.95) {
        mistCtx.fillStyle = `rgba(255,255,255,${CONFIG.mistBaseFill * (1 - blowPower * 0.75)})`;
        mistCtx.fillRect(0, 0, W, H);
      }

      for (const p of particles) {
        p.update(STATE.time, STATE.mouthX, STATE.mouthY, blowRadius, blowPower);
        p.draw(mistCtx);
        if (p.cleared) clearedCount++;
      }

      mistCtx.globalAlpha = 1;

      STATE.clearedRatio = clearedCount / CONFIG.particleCount;

      // 蟑螂显示控制：迷雾擦除 35% 后全部自由爬动，位于雾气下层
      if (STATE.clearedRatio > CONFIG.revealThreshold) {
        roachCanvas.style.opacity = '1';
      } else {
        roachCanvas.style.opacity = '0';
      }

      // 蟑螂自由更新绘制
      roachCtx.clearRect(0, 0, W, H);
      for (const r of roaches) {
        r.update();
        r.draw(roachCtx);
      }

      // 警报触发：迷雾擦除 55% 后延迟 2 秒弹出
      if (STATE.clearedRatio > CONFIG.alertThreshold && !STATE.alertShown) {
        STATE.alertDelay++;
        if (STATE.alertDelay >= 120) {
          STATE.alertShown = true;
          STATE.handsEnabled = true;
          alertEl.classList.add('active');
          scanline.classList.add('active');
          statusEl.textContent = '⚠️ 检测到生态入侵，请举起双手投降以重置空间';
        }
      } else if (!STATE.alertShown) {
        STATE.alertDelay = 0;
      }

      // 红光闪烁：警报阶段营造紧张氛围
      if (STATE.alertShown) {
        const flash = 0.35 + Math.sin(STATE.time * 0.35) * 0.2 + Math.random() * 0.1;
        redFlash.style.opacity = Math.min(0.65, flash).toFixed(3);
      } else {
        redFlash.style.opacity = '0';
      }

      // 手掌红色圆点 + 倒计时重置
      drawHandMarkers();

      // 举手投降时：先让警报框渐渐消失，消失后再显示 3/2/1 倒计时
      if (STATE.alertShown && STATE.twoHandsUp) {
        if (STATE.alertFadeFrames < 45) {
          STATE.alertFadeFrames++;
          const fade = 1 - STATE.alertFadeFrames / 45;
          alertEl.style.opacity = fade.toFixed(3);
          alertEl.style.visibility = 'visible';
          // 倒计时尚未开始
          countdownEl.classList.remove('active');
        } else {
          // 警报完全消失
          alertEl.style.opacity = '0';
          alertEl.style.visibility = 'hidden';
          alertEl.classList.remove('active');

          if (!STATE.countdownActive) {
            STATE.countdownActive = true;
            STATE.countdown = 3;
            STATE.countdownFrames = 0;
          }
          STATE.countdownFrames++;
          if (STATE.countdownFrames >= 20) {
            STATE.countdown--;
            STATE.countdownFrames = 0;
          }
          if (STATE.countdown > 0) {
            countdownEl.textContent = STATE.countdown;
            countdownEl.classList.add('active');
          } else {
            // 不显示 0，直接重置
            resetAll();
          }
        }
      } else {
        // 手放下则恢复警报显示
        STATE.alertFadeFrames = 0;
        if (STATE.alertShown) {
          alertEl.style.opacity = '';
          alertEl.style.visibility = '';
        }
        STATE.countdownActive = false;
        STATE.countdown = 0;
        STATE.countdownFrames = 0;
        countdownEl.classList.remove('active');
      }

      // 提示文字：只在首次进入时显示一次，第一次哈气后永久消失
      if (STATE.started && !STATE.hintDismissed && !STATE.alertShown) {
        hint.classList.add('show');
        hint.classList.remove('fade');
        if (STATE.mouthOpen) {
          STATE.hintDismissed = true;
        }
      } else if (STATE.hintDismissed) {
        hint.classList.add('fade');
        hint.classList.remove('show');
      }

      // 状态文字
      if (STATE.started) {
        statusEl.classList.add('show');
        if (!STATE.alertShown) {
          statusEl.textContent = `迷雾擦除 ${(STATE.clearedRatio * 100).toFixed(1)}% · ${STATE.mouthOpen ? '检测到哈气' : '等待哈气'} · 嘴距 ${STATE.mouthDistance.toFixed(4)}`;
        }
      }

      requestAnimationFrame(render);
    }

    function resetAll() {
      // 瞬间恢复所有迷雾：坐标与透明度全部回到初始状态
      for (const p of particles) p.reset(true);
      // 蟑螂坐标随机重组
      for (const r of roaches) r.reset();

      STATE.clearedRatio = 0;
      STATE.alertShown = false;
      STATE.handsEnabled = false;
      STATE.twoHandsUp = false;
      STATE.resetFrames = 0;
      STATE.alertDelay = 0;
      STATE.mouthOpen = false;
      STATE.countdown = 0;
      STATE.countdownActive = false;
      STATE.countdownFrames = 0;
      STATE.alertFadeFrames = 0;
      // hintDismissed 保持原值：提示词整个会话只出现一次

      alertEl.style.opacity = '';
      alertEl.style.visibility = '';
      alertEl.classList.remove('active');
      scanline.classList.remove('active');
      countdownEl.classList.remove('active');
      redFlash.style.opacity = '0';
      resultsHands = null;
      statusEl.textContent = '空间已重置 · 请再次哈气';
    }

    /* ==================== 启动入口 ==================== */
    startBtn.addEventListener('click', async () => {
      cover.classList.add('hidden');
      videoEl.classList.add('active');
      STATE.started = true;
      hint.classList.add('show');
      statusEl.classList.add('show');

      initMediaPipe();
      try {
        await camera.start();
      } catch (err) {
        console.error('摄像头启动失败:', err);
        statusEl.textContent = '摄像头启动失败，请允许摄像头权限后刷新';
      }
    });

    // 启动渲染循环（迷雾在封面阶段也会轻微飘动）
    requestAnimationFrame(render);
  </script>
</body>
</html>
